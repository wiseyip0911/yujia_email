server {
    listen 80;
    server_name scibot.yujiab.com;

    client_max_body_size 20m;

    location ^~ /.well-known/acme-challenge/ {
        root /opt/sci-platform;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://scibot.yujiab.com$request_uri;
    }
}

server {
    listen 80;
    server_name sci.47.242.253.223.nip.io sci.47.242.253.223.sslip.io;

    client_max_body_size 20m;

    location ^~ /.well-known/acme-challenge/ {
        root /opt/sci-platform;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name scibot.yujiab.com;

    client_max_body_size 20m;

    ssl_certificate /etc/letsencrypt/live/scibot.yujiab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scibot.yujiab.com/privkey.pem;
    ssl_session_cache shared:SCIBOTSSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
